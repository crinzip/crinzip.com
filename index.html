<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="src/assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <title>crinzip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0e0e0e;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        .center-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 6px;
        }

        .name {
            font-size: 32px;
            letter-spacing: -0.64px;
            white-space: nowrap;
        }

        .name .bold {
            font-weight: 700;
        }

        .name .medium {
            font-weight: 500;
        }

        .contact {
            font-size: 21px;
            color: #f1f1f1;
            letter-spacing: -0.84px;
            white-space: nowrap;
            font-weight: 400;
        }

        .music-player {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 51px;
            background: rgba(17, 17, 17, 0.2);
            border: 1px solid #171717;
            border-radius: 14px;
            box-shadow: 0 0 20px 0 rgba(30, 30, 30, 0.08);
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 12px;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.3s ease;
            z-index: 10;
        }

        .music-player:hover {
            border-color: #1e1e1e;
        }

        .play-btn {
            width: 12px;
            height: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn .icon-stop {
            width: 10px;
            height: 10px;
            background: #222;
            display: block;
        }

        .play-btn .icon-play {
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 6px 0 6px 10px;
            border-color: transparent transparent transparent #222;
            display: block;
        }

        .player-text {
            display: flex;
            flex-direction: column;
            gap: 3px;
            min-width: 0;
        }

        .player-label {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: -0.24px;
            color: #222;
            line-height: 1;
        }

        .player-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: -0.24px;
            color: #222;
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-reactive-blur {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 40%, transparent 70%);
            filter: blur(40px);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .audio-reactive-blur.active {
            opacity: 1;
        }

        #dvdCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            filter: blur(1.5px);
            pointer-events: none;
        }

        .sc-widget {
            position: absolute;
            width: 0;
            height: 0;
            overflow: hidden;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .center-content {
                align-items: center;
                gap: 6px;
                text-align: center;
            }

            .name {
                font-size: 28px;
            }

            .contact {
                font-size: 16px;
            }

            .music-player {
                bottom: 60px;
            }
        }
    </style>
</head>
<body>
    <canvas id="dvdCanvas"></canvas>

    <div class="center-content">
        <div class="name">
            <span class="bold">crin</span><span class="medium">zip</span>
        </div>
        <div class="contact">[@ :: patrik at milkpack dot tv]</div>
    </div>

    <div class="music-player" id="musicPlayer">
        <div class="play-btn" id="playBtn">
            <span class="icon-stop" id="playIcon"></span>
        </div>
        <div class="player-text">
            <span class="player-label" id="playerLabel">Currently playing</span>
            <span class="player-title" id="playerTitle">Loading...</span>
        </div>
    </div>

    <div class="audio-reactive-blur" id="reactiveBlur"></div>

    <div class="sc-widget">
        <iframe
            id="scWidget"
            allow="autoplay"
            src="https://w.soundcloud.com/player/?url=https%3A%2F%2Fsoundcloud.com%2Faquasine%2F8fc089d9-bd22-4a97-a45d-a8c7d562e9c2&auto_play=true&show_artwork=false&visual=false&origin=null"
        ></iframe>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const canvas = document.getElementById('dvdCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();

        const frustumSize = 10;
        let aspect = window.innerWidth / window.innerHeight;
        const camera = new THREE.OrthographicCamera(
            -frustumSize * aspect / 2, frustumSize * aspect / 2,
            frustumSize / 2, -frustumSize / 2,
            0.1, 100
        );
        camera.position.set(0, 0, 10);
        camera.lookAt(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(2, 4, 5);
        scene.add(dirLight);

        let loadedGLTF = null;
        const loader = new GLTFLoader();
        loader.load('src/models/crindoggo.glb', function (gltf) {
            loadedGLTF = gltf;
        });

        const bouncers = [];
        const modelScale = 0.3;
        const speed = 1.8;

        function screenToWorld(clientX, clientY) {
            const halfW = frustumSize * aspect / 2;
            const halfH = frustumSize / 2;
            const x = (clientX / window.innerWidth) * 2 * halfW - halfW;
            const y = -((clientY / window.innerHeight) * 2 * halfH - halfH);
            return { x, y };
        }

        function spawnModel(worldX, worldY) {
            if (!loadedGLTF) return;

            const clone = loadedGLTF.scene.clone(true);
            clone.scale.set(modelScale, modelScale, modelScale);
            clone.position.set(worldX, worldY, 0);

            clone.rotation.x = Math.random() * Math.PI * 2;
            clone.rotation.y = Math.random() * Math.PI * 2;
            clone.rotation.z = Math.random() * Math.PI * 2;

            scene.add(clone);

            const angle = Math.random() * Math.PI * 2;
            bouncers.push({
                model: clone,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                rotSpeedX: 0.2 + Math.random() * 0.4,
                rotSpeedY: 0.3 + Math.random() * 0.5,
                rotSpeedZ: 0.1 + Math.random() * 0.3
            });
        }

        let hasInteracted = false;
        function tryAutoplay() {
            if (hasInteracted) return;
            hasInteracted = true;
            if (window._scWidget) {
                window._scWidget.isPaused(function (paused) {
                    if (paused) window._scWidget.play();
                });
            }
        }

        document.addEventListener('click', function (e) {
            tryAutoplay();
            if (e.target.closest('#musicPlayer')) return;
            const world = screenToWorld(e.clientX, e.clientY);
            spawnModel(world.x, world.y);
        });
        document.addEventListener('keydown', tryAutoplay, { once: true });

        function getBounds() {
            const halfW = frustumSize * aspect / 2;
            const halfH = frustumSize / 2;
            const margin = modelScale * 0.8;
            return {
                minX: -halfW + margin,
                maxX: halfW - margin,
                minY: -halfH + margin,
                maxY: halfH - margin
            };
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const bounds = getBounds();

            for (const b of bouncers) {
                b.model.position.x += b.vx * delta;
                b.model.position.y += b.vy * delta;

                if (b.model.position.x >= bounds.maxX) { b.model.position.x = bounds.maxX; b.vx = -Math.abs(b.vx); }
                if (b.model.position.x <= bounds.minX) { b.model.position.x = bounds.minX; b.vx = Math.abs(b.vx); }
                if (b.model.position.y >= bounds.maxY) { b.model.position.y = bounds.maxY; b.vy = -Math.abs(b.vy); }
                if (b.model.position.y <= bounds.minY) { b.model.position.y = bounds.minY; b.vy = Math.abs(b.vy); }

                b.model.rotation.x += delta * b.rotSpeedX;
                b.model.rotation.y += delta * b.rotSpeedY;
                b.model.rotation.z += delta * b.rotSpeedZ;
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', function () {
            aspect = window.innerWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

    <script src="https://w.soundcloud.com/player/api.js"></script>
    <script>
        const player = document.getElementById('musicPlayer');
        const playIcon = document.getElementById('playIcon');
        const playerLabel = document.getElementById('playerLabel');
        const playerTitle = document.getElementById('playerTitle');
        const reactiveBlur = document.getElementById('reactiveBlur');

        const widget = SC.Widget(document.getElementById('scWidget'));
        window._scWidget = widget;
        let isPlaying = false;
        let animFrame = null;

        widget.bind(SC.Widget.Events.READY, function () {
            widget.setVolume(0);

            let hasFadedIn = false;
            widget.bind(SC.Widget.Events.PLAY, function fadeIn() {
                if (hasFadedIn) return;
                hasFadedIn = true;
                let vol = 0;
                const fadeInterval = setInterval(function () {
                    vol += 2;
                    if (vol >= 10) {
                        vol = 10;
                        clearInterval(fadeInterval);
                    }
                    widget.setVolume(vol);
                }, 50);
            });

            widget.getCurrentSound(function (sound) {
                if (sound && sound.title) {
                    const artist = sound.user ? sound.user.username : '';
                    playerTitle.textContent = artist ? sound.title + ' - ' + artist : sound.title;
                } else {
                    playerTitle.textContent = 'aquasine';
                }
            });
        });

        widget.bind(SC.Widget.Events.PLAY, function () {
            isPlaying = true;
            playIcon.className = 'icon-stop';
            playerLabel.textContent = 'Currently playing';
            reactiveBlur.classList.add('active');
            startReactiveAnimation();
        });

        widget.bind(SC.Widget.Events.PAUSE, function () {
            isPlaying = false;
            playIcon.className = 'icon-play';
            playerLabel.textContent = 'Paused';
            reactiveBlur.classList.remove('active');
            stopReactiveAnimation();
        });

        widget.bind(SC.Widget.Events.FINISH, function () {
            isPlaying = false;
            playIcon.className = 'icon-play';
            playerLabel.textContent = 'Click to play';
            reactiveBlur.classList.remove('active');
            stopReactiveAnimation();
        });

        player.addEventListener('click', function () {
            widget.toggle();
        });

        function startReactiveAnimation() {
            const startTime = performance.now();

            function animate() {
                const t = (performance.now() - startTime) / 1000;

                const wave1 = Math.sin(t * 2.1) * 0.3;
                const wave2 = Math.sin(t * 3.7 + 1.2) * 0.2;
                const wave3 = Math.sin(t * 5.3 + 2.8) * 0.15;
                const wave4 = Math.sin(t * 1.3 + 0.5) * 0.1;

                const combined = 0.45 + wave1 + wave2 + wave3 + wave4;
                const opacity = Math.max(0.1, Math.min(1, combined));

                reactiveBlur.style.opacity = opacity;

                const scale = 1 + Math.sin(t * 1.7) * 0.08 + Math.sin(t * 2.9 + 1) * 0.05;
                reactiveBlur.style.transform = 'translateX(-50%) scale(' + scale + ')';

                animFrame = requestAnimationFrame(animate);
            }

            animate();
        }

        function stopReactiveAnimation() {
            if (animFrame) {
                cancelAnimationFrame(animFrame);
                animFrame = null;
            }
        }
    </script>
</body>
</html>
